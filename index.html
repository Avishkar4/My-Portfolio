<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avishkar Patil - Liquid Hover Mask</title>
  <style>
    body {
      margin: 0;
      background-color: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* Padding added so the hover effect triggers just before you hit the text */
    .text-container {
      position: relative;
      padding: 40px; 
      font-size: 10vw;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -3px;
      white-space: nowrap;
      cursor: crosshair;
    }

    .text-base {
      color: rgba(255, 255, 255, 0.05); /* Made slightly darker so the neon pops more */
      user-select: none;
    }

    .text-reveal {
      position: absolute;
      top: 40px; /* Matches the padding of the container to keep it aligned */
      left: 40px;
      color: #ccff00; 
      user-select: none;
      pointer-events: none;
      
      /* THE FADE EFFECT: Hidden by default, smooth fade in */
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      
      /* Apply the heavy liquid filter */
      filter: url('#heavy-liquid');

      -webkit-mask-image: radial-gradient(
        circle 180px at var(--x, 50%) var(--y, 50%), 
        black 10%, 
        rgba(0,0,0,0.9) 40%,
        transparent 75%
      );
      mask-image: radial-gradient(
        circle 180px at var(--x, 50%) var(--y, 50%), 
        black 10%, 
        rgba(0,0,0,0.9) 40%,
        transparent 75%
      );
    }

    /* Trigger the fade-in when the mouse enters the container */
    .text-container:hover .text-reveal {
      opacity: 1;
    }
  </style>
</head>
<body>

  <svg style="position: absolute; width: 0; height: 0;" xmlns="http://www.w3.org/2000/svg" version="1.1">
    <defs>
      <filter id="heavy-liquid">
        <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="4" result="noise">
          <animate attributeName="baseFrequency" values="0.005;0.009;0.005" dur="8s" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </defs>
  </svg>

  <div class="text-container" id="hero-text">
    <div class="text-base">Avishkar Patil</div>
    <div class="text-reveal" id="reveal-layer">Avishkar Patil</div>
  </div>

      targetX = e.
