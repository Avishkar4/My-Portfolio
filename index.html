<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avishkar Patil - Red Spotlight Mask</title>
  <style>
    body {
      margin: 0;
      background-color: #050505;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .text-container {
      position: relative;
      padding: 40px; 
      font-size: 10vw;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -3px;
      white-space: nowrap;
      cursor: crosshair;
    }

    .text-base {
      color: rgba(255, 255, 255, 0.05);
      user-select: none;
    }

    .text-reveal {
      position: absolute;
      top: 40px; 
      left: 40px;
      color: #ff0000; /* Changed to red */
      user-select: none;
      pointer-events: none;
      
      /* Hidden by default, smooth fade in */
      opacity: 0;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);

      /* The smooth spotlight mask */
      -webkit-mask-image: radial-gradient(
        circle 180px at var(--x, 50%) var(--y, 50%), 
        black 10%, 
        rgba(0,0,0,0.9) 40%,
        transparent 75%
      );
      mask-image: radial-gradient(
        circle 180px at var(--x, 50%) var(--y, 50%), 
        black 10%, 
        rgba(0,0,0,0.9) 40%,
        transparent 75%
      );
    }

    /* Trigger the fade-in when the mouse enters the container */
    .text-container:hover .text-reveal {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="text-container" id="hero-text">
    <div class="text-base">Avishkar Patil</div>
    <div class="text-reveal" id="reveal-layer">Avishkar Patil</div>
  </div>

  <script>
    const container = document.getElementById('hero-text');
    const revealLayer = document.getElementById('reveal-layer');
    
    let targetX = container.offsetWidth / 2;
    let targetY = container.offsetHeight / 2;
    let currentX = targetX;
    let currentY = targetY;

    // Track the mouse only when it is inside the text container area
    container.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      // Subtract the 40px padding so the spotlight aligns perfectly with the cursor
      targetX = e.clientX - rect.left - 40;
      targetY = e.clientY - rect.top - 40;
    });

    function animate() {
      // LERP (Linear Interpolation) for the smooth dragging physics feel
      currentX += (targetX - currentX) * 0.08;
      currentY += (targetY - currentY) * 0.08;

      revealLayer.style.setProperty('--x', `${currentX}px`);
      revealLayer.style.setProperty('--y', `${currentY}px`);

      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
