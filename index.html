<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avishkar Patil - Interactive Mask</title>
  <style>
    /* Reset and layout */
    body {
      margin: 0;
      background-color: #0a0a0a; /* Dark background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    /* The wrapper that holds both text layers */
    .text-container {
      position: relative;
      font-size: 8vw; /* Scales with screen size */
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -2px;
      cursor: crosshair; /* Cool cursor for interacting */
    }

    /* Bottom Layer: The faint/default text */
    .text-base {
      color: rgba(255, 255, 255, 0.1); /* Ghostly white */
      user-select: none;
    }

    /* Top Layer: The vibrant revealed text */
    .text-reveal {
      position: absolute;
      top: 0;
      left: 0;
      color: #ccff00; /* Vibrant neon green (Lando Norris style) */
      user-select: none;
      pointer-events: none; /* Lets mouse events pass through to the container */
      
      /* The magic: A radial gradient mask driven by CSS variables */
      -webkit-mask-image: radial-gradient(
        circle 120px at var(--x, 50%) var(--y, 50%), 
        black 0%, 
        rgba(0,0,0,0.5) 40%,
        transparent 100%
      );
      mask-image: radial-gradient(
        circle 120px at var(--x, 50%) var(--y, 50%), 
        black 0%, 
        rgba(0,0,0,0.5) 40%,
        transparent 100%
      );
    }
  </style>
</head>
<body>

  <div class="text-container" id="hero-text">
    <div class="text-base">Avishkar Patil</div>
    <div class="text-reveal" id="reveal-layer">Avishkar Patil</div>
  </div>

  <script>
    const container = document.getElementById('hero-text');
    const revealLayer = document.getElementById('reveal-layer');
    
    // We use "target" for where the mouse actually is, 
    // and "current" for where the mask is currently drawing.
    let targetX = container.offsetWidth / 2;
    let targetY = container.offsetHeight / 2;
    let currentX = targetX;
    let currentY = targetY;

    // Track mouse movement over the text container
    container.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      targetX = e.clientX - rect.left;
      targetY = e.clientY - rect.top;
    });

    // When the mouse leaves, snap the mask back to the center
    container.addEventListener('mouseleave', () => {
      targetX = container.offsetWidth / 2;
      targetY = container.offsetHeight / 2;
    });

    // The Animation Loop: Linear Interpolation (LERP)
    // This gives the mask a "heavy fluid" delay as it follows the cursor
    function animate() {
      // Move 'current' towards 'target' by 10% every frame
      currentX += (targetX - currentX) * 0.1;
      currentY += (targetY - currentY) * 0.1;

      // Feed the calculated coordinates into the CSS variables
      revealLayer.style.setProperty('--x', `${currentX}px`);
      revealLayer.style.setProperty('--y', `${currentY}px`);

      // Keep the loop running
      requestAnimationFrame(animate);
    }

    // Start the loop
    animate();
  </script>

</body>
</html>
